<!DOCTYPE html>
<html>
<head>
  <title>Manage Records</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="nav">
    <a href="index.html">Home</a>
    <a href="manage.html">Manage</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>

  <h2>📊 Traffic Records</h2>

  <button onclick="loadRecords()">Load Records</button>

  <div id="records"></div>

</div>

<script>
const API = "http://localhost:5000/api/traffic";

function checkAuth() {
  if (!localStorage.getItem("loggedIn")) {
    window.location.href = "login.html";
  }
}

async function loadRecords() {
  const res = await fetch(API);
  const data = await res.json();

  const box = document.getElementById("records");
  box.innerHTML = "";

  data.forEach(r => {
    box.innerHTML += `
      <div class="card">
        <p><b>${r.origin}</b> → <b>${r.destination}</b></p>
        <p>${r.level} | Score: ${r.score?.toFixed(2)}</p>
        <button onclick="deleteRecord('${r._id}')">Delete</button>
      </div>
    `;
  });
}

async function deleteRecord(id) {
  await fetch(API + "/" + id, { method: "DELETE" });
  loadRecords();
}

function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}

checkAuth();
</script>

</body>
</html>
